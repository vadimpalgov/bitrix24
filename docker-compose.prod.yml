services:
  nginx:
    image: nginx:1.25-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-nginx
    restart: unless-stopped
    volumes:
      - ./:/var/www/bitrix
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${ROUTER_NAME}.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${ROUTER_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${ROUTER_NAME}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${ROUTER_NAME}.service=${ROUTER_NAME}"
      - "traefik.http.services.${ROUTER_NAME}.loadbalancer.server.port=80"
    networks:
      - traefik-net
      - internal

  php:
    build: ./docker/php
    container_name: ${COMPOSE_PROJECT_NAME}-php
    restart: unless-stopped
    volumes:
      - ./:/var/www/bitrix
    networks:
      - internal

  db:
    build: ./docker/mysql
    container_name: ${COMPOSE_PROJECT_NAME}-db
    restart: unless-stopped
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Europe/Moscow
    networks:
      - internal

  memcached:
    image: memcached:latest
    container_name: ${COMPOSE_PROJECT_NAME}-memcached
    restart: unless-stopped
    networks:
      - internal

networks:
  traefik-net:
    external: true
    name: ${TRAEFIK_NETWORK}
  internal:
    driver: bridge
